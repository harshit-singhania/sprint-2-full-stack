spring.application.name=used-car-management

logging.file.name=${LOG_FILE:log.txt}

spring.datasource.url=${DB_URL:jdbc:derby:usedcarsdb;create=true}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.apache.derby.iapi.jdbc.AutoloadedDriver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

app.session.expiration-minutes=${SESSION_EXPIRATION_MINUTES:120}

# Seeds demo accounts (demoadmin/demouser/demoseller), support tickets, and a
# starter catalogue of approved car listings so /browse is populated out of the box.
app.demo.seed-support-tickets=${DEMO_SEED:true}

notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
notification.email.from=${NOTIFICATION_EMAIL_FROM:no-reply@usedcars.local}

spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
server.port=${PORT:8080}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
