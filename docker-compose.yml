version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: used-cars-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:derby:/app/data/usedcarsdb;create=true
      - DB_USERNAME=
      - DB_PASSWORD=
      - JPA_DDL_AUTO=update
      - APP_DEMO_SEED_SUPPORT_TICKETS=true
      - SESSION_EXPIRATION_MINUTES=120
      - NOTIFICATION_EMAIL_ENABLED=false
      - PORT=8080
    volumes:
      - used-cars-data:/app/data
      - used-cars-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

  # Optional: Add PostgreSQL for production
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: used-cars-db
  #   environment:
  #     POSTGRES_DB: usedcars
  #     POSTGRES_USER: usedcars
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  used-cars-data:
  used-cars-logs:
