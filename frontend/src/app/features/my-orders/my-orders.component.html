<div class="page-container my-orders">
  <h2 class="h2">Your orders</h2>

  <div class="seg-filter">
    <button class="seg-btn" [class.seg-btn--active]="activeTab === 'all'" (click)="setTab('all')">All {{ orders.length }}</button>
    <button class="seg-btn" [class.seg-btn--active]="activeTab === 'buying'" (click)="setTab('buying')">Buying {{ buyerOrders.length }}</button>
    <button class="seg-btn" [class.seg-btn--active]="activeTab === 'selling'" (click)="setTab('selling')">Selling {{ sellerOrders.length }}</button>
  </div>

  <ng-container *ngIf="isLoading; else loadedState">
    <div class="surface-card orders-skeleton">
      <app-loading-spinner variant="row" *ngFor="let _ of skeletonRows"></app-loading-spinner>
    </div>
  </ng-container>

  <ng-template #loadedState>
    <app-empty-state *ngIf="error" title="Error" [message]="error"></app-empty-state>

    <ng-container *ngIf="!error">
      <app-empty-state
        *ngIf="filteredOrders.length === 0"
        title="No orders yet"
        message="When you buy or sell a car it shows up here."
        ctaLabel="Browse cars"
        ctaRoute="/browse">
      </app-empty-state>

      <div *ngIf="filteredOrders.length > 0" class="surface-card orders-card">
        <a
          class="order-row"
          *ngFor="let order of filteredOrders; trackBy: trackByOrderId"
          [routerLink]="['/my-orders', order.id]">
          <img class="order-thumb" [src]="orderThumb(order)" [alt]="order.car?.make + ' ' + order.car?.model">
          <div class="order-main">
            <div class="order-title h3">{{ order.car?.make }} {{ order.car?.model }}</div>
            <div class="order-meta mono">{{ order.createdAt | date:'dd MMM yyyy' }}</div>
          </div>
          <div class="order-chips">
            <app-status-chip [status]="order.status"></app-status-chip>
            <app-status-chip [status]="order.paymentStatus"></app-status-chip>
          </div>
          <div class="order-amount mono">{{ order.amount | inrCurrency }}</div>
          <i class="ph ph-caret-right order-caret"></i>
        </a>
      </div>
    </ng-container>
  </ng-template>
</div>
